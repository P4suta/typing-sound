commit-msg:
  jobs:
    # Conventional Commits drive release-please's version + CHANGELOG. The ci.yml PR-title gate
    # is authoritative for squash merges; this is an earlier local signal.
    # {1} = the commit-message file git passes to the commit-msg hook. Don't bypass with --no-verify.
    - name: conventional-commit
      run: committed --commit-file {1}

pre-commit:
  parallel: true
  jobs:
    - name: typos
      run: typos
    - name: taplo
      glob: "*.toml"
      # fmt --check enforces TOML formatting per taplo.toml.
      run: taplo fmt --check
    - name: format
      glob: "*.cs"
      # .editorconfig whitespace/layout format check.
      run: mise exec -- dotnet format TypingSound.slnx whitespace --verify-no-changes

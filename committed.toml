# Conventional Commits check (committed) for lefthook's commit-msg hook; keeps release-please input
# well-formed. The ci.yml PR-title gate is authoritative for squash merges; this is an earlier local signal.
style = "conventional"
# Lowercase subjects (`feat(x): add y`) to match the PR-title gate and git history; off the default.
subject_capitalized = false
# Enforce Conventional format only, not length: subjects come from squash-merged PR titles (60-100 chars) and the PR-title gate imposes no limit.
subject_length = 0
line_length = 0
# Match the types in CONTRIBUTING.md / PR-title gate; committed's default omits ci/build/deps/revert.
allowed_types = [
  "feat",
  "fix",
  "perf",
  "docs",
  "refactor",
  "test",
  "chore",
  "ci",
  "build",
  "deps",
  "style",
  "revert",
]

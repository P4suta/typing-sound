name: Bug report
description: Something doesn't work as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Logs help a lot. typing-sound is portable, so it
        writes its logs next to the executable — open the folder from the tray
        icon menu (**ログフォルダを開く** / "Open log folder"), or look in the
        `logs\` folder beside `TypingSound.exe` for `typingsound-YYYYMMDD.log`.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What you did and what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: input
    id: version
    attributes:
      label: Version
      description: The release tag you downloaded (e.g. v0.1.0).
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: e.g. Windows 11 23H2 (build 22631)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log excerpts
      description: From `logs\typingsound-YYYYMMDD.log` (next to the exe).
      render: shell

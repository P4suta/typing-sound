name: Generate SBOM and scan for vulnerabilities
description: >-
  Generate the C# CycloneDX 1.6 SBOM into build/sbom/ and gate on
  known-vulnerable dependencies in the resolved shipped closure (osv-scanner over
  the SBOM — the view of the .NET/NuGet graph). The single source shared by
  release.yml (release gate) and nightly.yml so the tool versions never drift.
  Requires the toolchain (mise: dotnet) already installed and `just dist` already
  run (NuGet restored). No secrets needed.

runs:
  using: composite
  steps:
    # SBOM tooling (release/nightly-only; deliberately not in the dev loop).
    # Version-pinned; NuGet verifies package integrity against its immutable
    # index, so a pinned version is fetched reproducibly. Append the dotnet
    # global-tool dir to PATH for the SBOM step.
    - name: Install SBOM tools
      shell: pwsh
      run: |
        dotnet tool install --global CycloneDX --version 6.2.0
        "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

    # SBOM (CycloneDX 1.6 JSON), generated after the build so the resolved graph
    # matches what shipped. win-x64 runtime graph (self-contained portable).
    - name: Generate C# SBOM (CycloneDX)
      shell: pwsh
      run: >-
        dotnet CycloneDX TypingSound.App/TypingSound.App.csproj
        --output build/sbom --filename app.cdx.json
        --output-format Json --spec-version 1.6 --runtime win-x64

    # Gate on known-vulnerable deps in the resolved shipped closure. Accepted /
    # unfixable advisories go in osv-scanner.toml.
    - name: Install osv-scanner
      uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
      with:
        tool: osv-scanner@2.3.6
    - name: Scan SBOM for known vulnerabilities (gate)
      shell: pwsh
      run: >-
        osv-scanner scan source
        -L build/sbom/app.cdx.json
        --config osv-scanner.toml

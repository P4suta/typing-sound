# Dispatched by release-please. Three jobs to minimize signing-secret exposure:
# build -> assemble dist + SBOM (no secrets). sign -> Authenticode-sign first-party
# PEs via SSL.com eSigner (approval-gated `release` environment). publish -> re-verify,
# package (zip + checksums), keyless build-provenance + SBOM attestation, attach to
# the release-please draft and publish (publish=true only). See docs/SIGNING.md,
# docs/adr/0003-ci-signing-pipeline.md. Verify: gh attestation verify <zip> --repo P4suta/typing-sound
name: release

on:
  # Dispatched after release-please creates the DRAFT Release. publish=false runs a
  # signing smoke test from a branch (no Release created).
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Version tag to release (e.g. v0.1.0), or a branch/ref for publish=false signing tests"
        required: true
        type: string
      sha:
        description: "Source commit SHA (release-please passes the release commit; defaults to tag_name)"
        required: false
        type: string
      publish:
        description: "Publish a GitHub Release (false = build+sign+verify only, no Release/attestation)"
        required: false
        default: true
        type: boolean

# One per ref. Never cancel mid sign/publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Version tag (vX.Y.Z) — reused for stamp / zip name / release.
  TAG: ${{ inputs.tag_name }}
  # Source to build: release-please passes the release commit SHA (pinned so main moving
  # during approval has no effect); manual smoke falls back to tag_name.
  REF: ${{ inputs.sha || inputs.tag_name }}
  # SSL.com IV cert subject, asserted at verification so a different (chain-valid) cert
  # can't pass silently. Shared by sign + publish.
  SIGNER_SUBJECT_CONTAINS: "CN=Yasunobu Sakashita"

jobs:
  # 1) Assemble dist + SBOM. No secrets.
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      # Fail fast if a publishing run targets a non-version ref, before the gated sign
      # job burns reviewer approval + eSigner quota. Excludes publish=false smoke tests.
      - name: Validate tag for a publishing run
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
        shell: bash
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::publishing run requires a vX.Y.Z tag, got '$TAG' (use publish=false for a signing smoke test from a branch)"
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.REF }}

      # Pinned dotnet / just from mise.toml — ship built with exact pins.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true

      # Stamp as a clean stable release. Env vars are read as MSBuild properties, so
      # Directory.Build.targets uses Channel=stable for a bare X.Y.Z InformationalVersion.
      - name: Stamp stable build version
        shell: bash
        run: echo "SourceRevision=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Build distributable bundle
        env:
          Channel: stable
        run: just dist x64

      # SBOM (CycloneDX 1.6) + osv-scanner release gate in a composite shared with
      # nightly.yml (no tool drift). Run after build to match the shipped graph.
      - name: Generate SBOM and scan (release gate)
        uses: ./.github/actions/sbom-scan

      - name: Upload unsigned bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/TypingSound
          retention-days: 1
          if-no-files-found: error

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: build/sbom
          retention-days: 1
          if-no-files-found: error

  # 2) Authenticode-sign first-party PEs via SSL.com eSigner. Only job holding signing
  #    secrets -> approval-gated `release` environment.
  sign:
    needs: build
    runs-on: windows-latest
    environment: release
    permissions:
      contents: read
    env:
      # secrets.* can't be used in if:, so hoist presence to a job env bool; steps gate on
      # HAVE_SIGNING. batch_sign is credential_id-driven, so key off that.
      HAVE_SIGNING: ${{ secrets.ES_USERNAME != '' && secrets.CREDENTIAL_ID != '' }}
    steps:
      # Verify uses a local composite action, so the repo tree is needed. Pinned to the
      # build commit; before artifact download so checkout's clean doesn't wipe the bundle.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.REF }}

      # dotnet for the eng/TsBuild helper used by the staging steps below.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true

      - name: Download unsigned bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/TypingSound

      # Stage only first-party PEs flat (the PE list lives in eng/TsBuild). Bundled .NET /
      # WindowsAppSDK runtime DLLs are already Microsoft-signed — re-signing wastes eSigner
      # quota and claims no rights. `signed` is the eSigner output dir (created up front).
      - name: Stage first-party binaries for signing
        if: env.HAVE_SIGNING == 'true'
        shell: bash
        run: |
          mkdir -p signed
          mise exec -- dotnet run --project eng/TsBuild -- sign-stage dist/TypingSound sign-stage

      - name: Sign staged binaries (SSL.com eSigner)
        if: env.HAVE_SIGNING == 'true'
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: batch_sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          dir_path: ${{ github.workspace }}\sign-stage
          # Write signed files to a dedicated dir. batch_sign ignores -override (the Action
          # doesn't forward it), so without an explicit output_path the signed output lands
          # elsewhere and copy-back grabs the unsigned originals (-> Verify sees "NotSigned").
          output_path: ${{ github.workspace }}\signed
          environment_name: PROD
          # SSL.com requires a pre-sign malware scan; off, batch_sign is rejected with
          # "hash needs to be scanned first". true has the Action scan before signing.
          malware_block: "true"

      - name: Copy signed binaries back into the bundle
        if: env.HAVE_SIGNING == 'true'
        shell: bash
        run: mise exec -- dotnet run --project eng/TsBuild -- sign-unstage signed dist/TypingSound

      # Never ship supposedly-signed binaries that are silently unsigned / un-timestamped /
      # wrong-cert. Verification (chain + RFC 3161 timestamp + signer subject) is a composite
      # shared with the publish gate (no drift).
      - name: Verify signatures
        if: env.HAVE_SIGNING == 'true'
        uses: ./.github/actions/verify-signatures
        with:
          bundle-dir: dist/TypingSound
          signer-subject-contains: ${{ env.SIGNER_SUBJECT_CONTAINS }}

      - name: Warn if unsigned
        if: env.HAVE_SIGNING != 'true'
        run: echo "::warning::Signing secrets absent - publishing UNSIGNED binaries (SmartScreen will warn end users). See docs/SIGNING.md to enable."

      - name: Upload signed bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-signed
          path: dist/TypingSound
          retention-days: 1
          if-no-files-found: error

  # 3) Package the signed dist, attest, attach to the Release and publish.
  publish:
    needs: sign
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
    runs-on: windows-latest
    # Second approval gate for an irreversible step (ADR-0003): GitHub Releases are
    # immutable, so publishing requires its own approval, separate from sign.
    environment: release
    permissions:
      contents: write
      id-token: write # OIDC for keyless Sigstore attestation
      attestations: write
    steps:
      # Repo needed for just package + toolchain.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.REF }}

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true

      - name: Download signed bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-signed
          path: dist/TypingSound

      # Gate at the irreversible boundary: a publishing run must ship signed binaries. When
      # signing secrets are absent sign only warns and passes unsigned (HAVE_SIGNING=false),
      # so FAIL here before attestation / immutable Release. Same composite verify as sign.
      - name: Require the bundle to be signed before publishing
        uses: ./.github/actions/verify-signatures
        with:
          bundle-dir: dist/TypingSound
          signer-subject-contains: ${{ env.SIGNER_SUBJECT_CONTAINS }}

      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: build/sbom

      # Zip + checksum the signed bundle. just package names it:
      # TypingSound-<version>-win-x64.zip + SHA256SUMS.txt in build/package/.
      - name: Package (zip + checksums)
        run: just package ${{ env.TAG }}

      # Keyless build-provenance + SBOM attestation via the workflow OIDC token (no stored
      # secrets). Verify: gh attestation verify <zip> --repo P4suta/typing-sound
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            build/package/TypingSound-*-win-x64.zip
            build/package/SHA256SUMS.txt

      - name: Attest C# SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: build/package/TypingSound-*-win-x64.zip
          sbom-path: build/sbom/app.cdx.json

      # release-please created this Release as a DRAFT (config "draft": true) — no assets or
      # tag yet. softprops uploads files then publishes the draft (immutable requires
      # assets-before-publish); publishing creates the tag. Keep release-please's notes.
      - name: Publish the draft release with the signed assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.TAG }}
          files: |
            build/package/TypingSound-*-win-x64.zip
            build/package/SHA256SUMS.txt
            build/sbom/app.cdx.json

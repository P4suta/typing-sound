# nightly — build an unsigned dist from main's tip as a 14-day GitHub Actions artifact (not
# a Release: keeps the Releases list clean, avoids Immutable Releases). Full supply-chain
# provenance except Authenticode (SBOM + osv gate + keyless provenance/SBOM attestation);
# signing is stable-only (ADR-0004). Version X.Y.Z-nightly.<date>+g<sha> (Channel=nightly).
# Verify: gh attestation verify <zip> --repo P4suta/typing-sound

name: nightly

on:
  schedule:
    - cron: "47 16 * * *" # 01:47 JST
  workflow_dispatch:

# Keep one "latest". A running older nightly may be cancelled.
concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nightly:
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write # OIDC for keyless Sigstore attestation
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # freshness gate needs history to check for commits in the last 24h

      # Freshness gate: manual dispatch always builds; scheduled runs build only if main
      # moved in the last 24h (else build=false + ::notice:: skips every later step).
      - name: Decide whether to build
        id: freshness
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -n "$(git log --since='24 hours ago' --oneline)" ]]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "::notice::main unchanged in the last 24h — skipping nightly."
          fi

      - name: Setup mise (dotnet + just)
        if: steps.freshness.outputs.build == 'true'
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true

      # Fix the date and short SHA. Env vars are read as MSBuild properties, so the build
      # picks up Channel=nightly / NightlyDate / SourceRevision.
      - name: Stamp nightly build identity
        if: steps.freshness.outputs.build == 'true'
        shell: bash
        run: |
          DATE=$(date -u +%Y%m%d)
          {
            echo "NIGHTLY_DATE=$DATE"
            echo "NightlyDate=$DATE"
            echo "SourceRevision=$(git rev-parse --short HEAD)"
          } >> "$GITHUB_ENV"

      - name: Build distributable bundle
        if: steps.freshness.outputs.build == 'true'
        env:
          Channel: nightly
        run: just dist x64

      - name: Generate SBOM and scan (gate)
        if: steps.freshness.outputs.build == 'true'
        uses: ./.github/actions/sbom-scan

      - name: Package (zip + checksums)
        if: steps.freshness.outputs.build == 'true'
        run: just package nightly.${{ env.NIGHTLY_DATE }}

      - name: Attest build provenance
        if: steps.freshness.outputs.build == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            build/package/TypingSound-nightly.*-win-x64.zip
            build/package/SHA256SUMS.txt

      - name: Attest C# SBOM
        if: steps.freshness.outputs.build == 'true'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: build/package/TypingSound-nightly.*-win-x64.zip
          sbom-path: build/sbom/app.cdx.json

      # 14-day Actions artifact (not a Release).
      - name: Upload nightly artifact
        if: steps.freshness.outputs.build == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: TypingSound-nightly-${{ env.NIGHTLY_DATE }}
          path: |
            build/package/TypingSound-nightly.*-win-x64.zip
            build/package/SHA256SUMS.txt
            build/sbom/app.cdx.json
          retention-days: 14
          if-no-files-found: error

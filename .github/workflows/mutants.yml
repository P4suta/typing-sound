# Weekly mutation testing (Stryker.NET) on the Core layer — measures whether tests actually
# guard the logic (invisible to coverage alone). Informational only (continue-on-error, no
# gate); uploads a surviving-mutant report (HTML/JSON) as an artifact.
name: mutants

on:
  schedule:
    - cron: "53 4 * * 1" # Monday 04:53 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutants:
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true # informational only; never gates
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true

      # Restore dotnet-stryker from the local tool manifest (.config/dotnet-tools.json).
      - name: Restore local tools
        run: mise exec -- dotnet tool restore

      # Core.Tests references only Core, so Stryker auto-detects the target.
      - name: Run Stryker (Core)
        working-directory: TypingSound.Core.Tests
        run: mise exec -- dotnet stryker --reporter html --reporter json --reporter progress

      - name: Upload Stryker report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutants-out
          path: TypingSound.Core.Tests/StrykerOutput
          retention-days: 30
          if-no-files-found: warn

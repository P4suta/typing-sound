# CodeQL static analysis of the C# app and the workflows themselves. Two analyses:
# csharp (analyze) uses build-mode manual — `just build-all` with mise's pinned SDK builds
# with the same pins as CI (autobuild would also work); actions (analyze-actions) uses
# build-mode none on cheap ubuntu. The `analyze` job is a required status check (.github/rulesets/).
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"

# Top level read-only; each job requests only the security-events: write it needs for
# SARIF upload (Scorecard's Token-Permissions scores per-job write).
permissions:
  contents: read

jobs:
  analyze:
    runs-on: windows-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Pinned dotnet / just from mise.toml (exact match with local/CI).
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: csharp
          build-mode: manual

      - name: build for CodeQL
        run: just build-all

      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:csharp"

  # Analyze the workflow YAML itself (GITHUB_TOKEN perms, untrusted-input, etc.).
  # build-mode none needs no toolchain, so run on cheap ubuntu.
  analyze-actions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: actions
          build-mode: none
      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:actions"

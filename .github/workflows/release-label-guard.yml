# Prevents silently skipping a release by stripping the `autorelease: pending` label that
# release-please needs to cut the tag + Release: re-adds it if removed from an open
# release-please PR. Like no-automerge-on-release-pr.yml: pull_request_target, API-only, no
# PR checkout, scoped to release-please branches. The `release: approved` label is not
# guarded — removing it (revoking approval) is legitimate.
name: release-label-guard

on:
  pull_request_target:
    types: [unlabeled]

permissions:
  contents: read

jobs:
  reinstate:
    # Only guard OPEN release-please PRs: after merge/close release-please has already cut
    # the release, so a lingering `autorelease: pending` would try to RE-release the merged
    # PR — removing the stale label there is correct and must not be reinstated.
    if: >-
      github.event.pull_request.state == 'open'
      && startsWith(github.event.pull_request.head.ref, 'release-please--')
      && github.event.label.name == 'autorelease: pending'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Reinstate release-please's tracking label
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR" --repo "$REPO" --add-label "autorelease: pending"
          gh pr comment "$PR" --repo "$REPO" --body \
            "🔒 Restored the \`autorelease: pending\` label — release-please needs it to cut the \`vX.Y.Z\` tag and Release after merge; removing it would silently skip the release. To stop a release, just don't merge (or remove \`release: approved\`)."

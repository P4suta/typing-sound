# release-please は Release PR を `autorelease: pending` ラベルで追跡し、マージ後にそのラベルを
# 持つマージ済み PR を見つけてタグ + GitHub Release を切る(ラベルを `autorelease: tagged` に付け替える)。
# このラベルを剥がすとリリースが黙って切られなくなる。GitHub にはラベル単位のロックが無いので、
# 代わりに: 誰かが release-please PR から `autorelease: pending` を外したら即座に付け直す。
#
# no-automerge-on-release-pr.yml に倣い pull_request_target: main の定義から write トークンで動き、
# API のみ(PR コードは checkout しない)、release-please 自身のブランチにスコープ — 安全で通常 PR には
# 触れない。人間の承認ラベル `release: approved` は敢えてガードしない: 外す(承認取り消し)のは正当な操作。
name: release-label-guard

on:
  pull_request_target:
    types: [unlabeled]

permissions:
  contents: read

jobs:
  reinstate:
    # `unlabeled` イベントの github.event.label.name は今剥がされたラベル。OPEN な Release PR でのみ
    # ガードする: PR がマージ/クローズされた後は release-please は既にリリースを切り終えており、
    # 残った `autorelease: pending` はそのマージ済み PR を RE-release させようとする — なので閉じた PR から
    # 古いラベルを外すのは正しく、付け直してはいけない。
    if: >-
      github.event.pull_request.state == 'open'
      && startsWith(github.event.pull_request.head.ref, 'release-please--')
      && github.event.label.name == 'autorelease: pending'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Reinstate release-please's tracking label
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR" --repo "$REPO" --add-label "autorelease: pending"
          gh pr comment "$PR" --repo "$REPO" --body \
            "🔒 Restored the \`autorelease: pending\` label — release-please needs it to cut the \`vX.Y.Z\` tag and Release after merge; removing it would silently skip the release. To stop a release, just don't merge (or remove \`release: approved\`)."

name: CI

on:
  push:
    branches: [main]
  pull_request:
    # labeled/unlabeled re-evaluate the label-driven release-gate when `release: approved`
    # is added/removed (else the gate result goes stale). Heavy windows build-test skips on
    # label events, so cost is the cheap ubuntu tier + gate only.
    types: [opened, synchronize, reopened, labeled, unlabeled]

# Cancel superseded PR runs. Never cancel main.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_NOLOGO: "1"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"

permissions:
  contents: read

jobs:
  # Skip the heavy windows job on docs-only PRs (ci-required treats the skip as success).
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.f.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: f
        with:
          filters: |
            code:
              - '**/*.cs'
              - '**/*.csproj'
              - '**/*.xaml'
              - 'TypingSound.slnx'
              - 'Directory.Build.props'
              - 'Directory.Build.targets'
              - '.editorconfig'
              - 'justfile'
              - 'mise.toml'
              - '.github/workflows/ci.yml'

  # ubuntu hygiene tier: parallel, no needs, cheap fast-fail signal.
  hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Lint workflow YAML: syntax, ${{ }} expression types, shellcheck on run: blocks.
      - uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0 (reads _typos.toml)
      - uses: uncenter/setup-taplo@b18c8c8302695fe63d6853bc004006215ac52b91 # v2
        with:
          version: "0.10.0"
      # Check TOML *formatting* (taplo.toml), not just validity.
      - run: taplo fmt --check

  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: read
    steps:
      # Conventional Commits PR-title gate (authoritative for squash merge). types match committed.toml.
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Defense in depth (docs/RELEASING.md): a release-please Release PR ("autorelease: pending")
  # can't merge until a human deliberately adds "release: approved". Non-release PRs pass.
  release-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - name: Require an explicit approval label on a Release PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.number }}
          REPO: ${{ github.repository }}
        run: |
          labels=$(gh pr view "$PR" --repo "$REPO" --json labels -q '.labels[].name')
          if echo "$labels" | grep -qx "autorelease: pending"; then
            if echo "$labels" | grep -qx "release: approved"; then
              echo "Release PR carries 'release: approved' — gate open."
            else
              echo "::error::This is a release PR. Add the 'release: approved' label to allow merge (deliberate release; see docs/RELEASING.md)."
              exit 1
            fi
          else
            echo "Not a release PR — gate passes."
          fi

  # windows build tier: format check + full build + tests with coverage (just verify).
  build-test:
    needs: [hygiene, changes]
    # Skip on docs-only changes and on label events (gate-reeval path; code unchanged).
    # ci-required treats either skip as success.
    if: needs.changes.outputs.code == 'true' && github.event.action != 'labeled' && github.event.action != 'unlabeled'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Pinned dotnet / just from mise.toml (exact match with local).
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
      # Format check + full build (warnings=errors via Directory.Build.props) + tests with coverage.
      - name: Verify (format + build + coverage)
        run: just verify

  # Single required status check. Transitively enforces the leaves and treats `skipped`
  # (docs-only / paths gate) as success (avoids "Expected — Waiting" deadlock). PR-only:
  # it gates PR merges, and main has nothing to gate — plus a cancelled push run would be
  # scored cancelled=failure by gate-results and wrongly redden main.
  ci-required:
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [changes, hygiene, pr-title, release-gate, build-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: gate on needed job results
        uses: ./.github/actions/gate-results
        with:
          results: ${{ join(needs.*.result, ',') }}

# NuGet known-vulnerability audit (C# equivalent of cargo-audit). Runs `dotnet list package
# --vulnerable` and FAILs if any dependency (including transitive) has a GHSA advisory. Runs
# on push/PR plus a weekly cron to catch newly disclosed advisories with no code change.
# Build-time <NuGetAudit> (Directory.Build.props) only warns, so this is the real gate.
name: nuget-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "33 4 * * 1" # Monday 04:33 UTC (offset from codeql/scorecard)

permissions:
  contents: read

jobs:
  audit:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true

      - name: Restore
        run: mise exec -- dotnet restore TypingSound.slnx

      # `dotnet list package --vulnerable` exits 0 even when vulnerable, so decide by grepping
      # its output for GHSA lines — advisory URLs (advisories/GHSA-...) only appear on vulnerable rows.
      - name: Audit vulnerable packages
        shell: bash
        run: |
          mise exec -- dotnet list TypingSound.slnx package --vulnerable --include-transitive 2>&1 | tee audit.txt
          if grep -qE 'advisories/GHSA-' audit.txt; then
            echo "::error::vulnerable NuGet package(s) found — bump the dependency or record an accepted advisory."
            exit 1
          fi
          echo "No vulnerable NuGet packages."

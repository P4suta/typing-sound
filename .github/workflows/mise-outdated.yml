# Watch whether mise tool pins (mise.toml) have fallen behind latest — the gap Dependabot
# can't see. Dependabot covers nuget and github-actions but not the mise ecosystem, so pinned
# dev/CI toolchain (dotnet, just, lefthook, committed, actionlint, typos ...) drifts silently.
# `mise outdated --bump` compares each pin to the latest beyond the pin (not in-pin patch);
# only bump != null is actionable (in-pin patch is left to `mise install`).
name: mise-outdated

on:
  schedule:
    - cron: "17 5 * * 1" # Monday 05:17 UTC (offset from other weekly jobs)
  workflow_dispatch:

permissions:
  contents: read # read mise.toml
  issues: write # open/close the mise-outdated tracking issue

jobs:
  outdated:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # install: false — only the mise binary is needed to query registries for latest;
      # provisioning every pinned tool (cargo: backends build from source) is wasted here.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: false

      - name: Check pins against latest (beyond-pin)
        id: check
        shell: bash
        run: |
          # --bump: latest beyond the pin. --local: this repo's mise.toml only (ignore global).
          # Exits 0 even when updates exist.
          mise outdated --bump --local --json > outdated.json || true
          echo "Raw mise outdated --bump --local:"; cat outdated.json
          # Keep only tools whose pin is behind (bump != null); in-pin patch is bump == null.
          drift=$(jq '[to_entries[] | select(.value.bump != null)] | length' outdated.json)
          echo "drift=$drift" >> "$GITHUB_OUTPUT"
          {
            echo "| Tool | Pinned | Latest |"
            echo "|---|---|---|"
            jq -r 'to_entries[] | select(.value.bump != null)
                   | "| `\(.key)` | \(.value.requested) | \(.value.bump) |"' outdated.json
          } > drift-table.md
          echo "Tools whose pin is behind: $drift"

      - name: Open / update / close the tracking issue
        shell: bash
        env:
          DRIFT: ${{ steps.check.outputs.drift }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create mise-outdated --color FBCA04 --force \
            --description "A mise.toml toolchain pin has fallen behind its latest version (mise-outdated.yml)"
          existing=$(gh issue list --label mise-outdated --state open --json number --jq '.[0].number // empty')

          if [ "$DRIFT" -gt 0 ]; then
            {
              echo "## 🧰 mise toolchain pins are behind"
              echo
              echo "\`mise outdated --bump\` found pins in \`mise.toml\` whose latest version is **beyond the current pin** — Dependabot doesn't watch the mise ecosystem, so these need a manual bump."
              echo
              cat drift-table.md
              echo
              echo "- Detection run: $RUN_URL"
              echo "- Fix: bump the pin in \`mise.toml\`, \`mise install\`, then run \`just verify\`."
            } > issue-body.md
            if [ -n "$existing" ]; then
              gh issue edit "$existing" --body-file issue-body.md
              echo "Updated issue #$existing."
            else
              gh issue create --title "mise toolchain pins are behind latest" \
                --label mise-outdated --body-file issue-body.md
            fi
          else
            if [ -n "$existing" ]; then
              gh issue comment "$existing" --body "All mise.toml pins are current as of $RUN_URL. Closing."
              gh issue close "$existing"
            fi
            echo "All mise.toml pins are current."
          fi

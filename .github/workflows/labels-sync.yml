# リポジトリのラベルを .github/labels.json(唯一の真実) から突き合わせ、名前/色/説明を版管理する
# (手作業で設定しない)。manifest が変わった時 / 手動でのみ動く。
#
# 敢えて gh + jq(どちらもランナーに同梱)で行い、labeler action は使わない: サードパーティを増やすと
# 信頼面が広がる。gh label create --force は作成 or 更新で削除はしないので、同期は加算的 — manifest に
# 無いラベル(GitHub 既定や将来のツール用)はそのまま残る。
name: labels-sync

on:
  push:
    branches: [main]
    paths: [".github/labels.json"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # manifest を checkout(ジョブ perms はトップを置換するので明示)
      issues: write # ラベルの作成/更新
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Sync labels from manifest (additive; never deletes)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          jq -c '.[]' .github/labels.json | while IFS= read -r row; do
            name=$(jq -r '.name' <<<"$row")
            color=$(jq -r '.color' <<<"$row")
            # GitHub はラベル説明を 100 文字までに制限。念のため切り詰める。
            desc=$(jq -r '.description' <<<"$row")
            desc=${desc:0:100}
            echo "syncing: $name"
            gh label create "$name" --color "$color" --description "$desc" --force
          done

# Version-controls repo labels (name/color/description) from .github/labels.json, the
# single source of truth. Uses gh + jq (both on the runner) rather than a third-party
# labeler action to avoid widening the trust surface. Runs on manifest change / manually.
# gh label create --force is additive (create-or-update, never deletes), so labels absent
# from the manifest (GitHub defaults, future tools) are left intact.
name: labels-sync

on:
  push:
    branches: [main]
    paths: [".github/labels.json"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # checkout the manifest (job perms replace the top level, so explicit)
      issues: write # create/update labels
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Sync labels from manifest (additive; never deletes)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          jq -c '.[]' .github/labels.json | while IFS= read -r row; do
            name=$(jq -r '.name' <<<"$row")
            color=$(jq -r '.color' <<<"$row")
            # GitHub caps label descriptions at 100 chars; truncate to be safe.
            desc=$(jq -r '.description' <<<"$row")
            desc=${desc:0:100}
            echo "syncing: $name"
            gh label create "$name" --color "$color" --description "$desc" --force
          done

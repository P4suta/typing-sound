# Prevents pre-arming auto-merge on a release-please PR (which would collapse the
# deliberate-merge gate into a single later `release: approved` label): re-disables
# auto-merge as soon as it's enabled. Runs pull_request_target (write token from main's
# definition, API-only, no PR checkout), scoped to release-please branches.
name: no-automerge-on-release-pr

on:
  pull_request_target:
    types: [auto_merge_enabled]

permissions:
  contents: read

jobs:
  disable:
    if: startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Disable auto-merge on the Release PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR" --repo "$REPO" --disable-auto-merge
          gh pr comment "$PR" --repo "$REPO" --body \
            "🔒 Auto-merge was disabled automatically: a release is a deliberate act. Add the \`release: approved\` label and merge this PR by hand (see docs/RELEASING.md)."

# OpenSSF Scorecard: weekly supply-chain posture scan (pinned deps, token perms, branch
# protection, SAST coverage, dangerous-workflow patterns, etc.). Results land in Security >
# Code scanning; publish_results feeds the public Scorecard API behind the README badge.
# Assumes a public repo.
name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "41 5 * * 1" # Monday; offset from other weekly jobs (codeql/nuget-audit)
  push:
    branches: [main]

# Top level minimal; the job grants only what Scorecard needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results to the public Scorecard API (badge)
      contents: read
      actions: read # read workflows for token / pinned-deps checks
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # Scorecard-recommended (no credentials left in checkout)

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      # Surface in the Security tab (and PR/commit annotations).
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif

# release-please — version / CHANGELOG / tag bot (ADR-0001). Maintains a Release PR;
# merging it creates a DRAFT Release and dispatches release.yml. Runs as a GitHub App
# (RELEASE_PLEASE_CLIENT_ID / RELEASE_PLEASE_PRIVATE_KEY); dormant green no-op until those
# secrets are set. See docs/RELEASING.md.

name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never cancel mid-release. One per ref anyway.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # App private key lives in this environment's secrets, with a main-only deployment-branch
    # policy so other branches (or malicious workflow edits on a feature branch) can't read
    # the credentials — repository secrets would be readable from any branch's push. No
    # required reviewers on purpose: release-please must run unattended. ADR-0001.
    environment: release-please
    permissions:
      contents: write # release commit + draft Release
      pull-requests: write # Release PR
      actions: write # dispatch release.yml
    env:
      # Server-side boolean — never exposes the secret value.
      HAS_APP: ${{ secrets.RELEASE_PLEASE_CLIENT_ID != '' && secrets.RELEASE_PLEASE_PRIVATE_KEY != '' }}
    steps:
      # Mint a short-lived installation token scoped to this repo. Unlike GITHUB_TOKEN, its
      # push (vX.Y.Z tag) can trigger release.yml.
      - name: Mint GitHub App token
        id: app-token
        if: env.HAS_APP == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      - name: release-please (active)
        id: rp
        if: env.HAS_APP == 'true'
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # The Release is a DRAFT (config "draft": true), which fires no `release` event and
      # creates no tag, so dispatch release.yml explicitly. GITHUB_TOKEN may trigger
      # workflow_dispatch (the one recursion-guard exception), so no App token needed.
      - name: Trigger the signed-release build
        if: ${{ env.HAS_APP == 'true' && steps.rp.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.rp.outputs.tag_name }}
          SHA: ${{ steps.rp.outputs.sha }}
        run: |
          gh workflow run release.yml --repo "$REPO" --ref main \
            -f tag_name="$TAG" -f sha="$SHA" -f publish=true

      - name: release-please (dormant — App not configured)
        if: env.HAS_APP != 'true'
        run: |
          echo "::notice::release-please is dormant — set the RELEASE_PLEASE_CLIENT_ID and"
          echo "RELEASE_PLEASE_PRIVATE_KEY secrets (a GitHub App) to activate."
          echo "See docs/RELEASING.md and docs/adr/0001-automated-versioning-with-release-please.md."

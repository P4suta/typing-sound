version: 2
updates:
  # Weekly NuGet update PRs.
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Conventional Commits PR titles (the default "Bump X..." fails CI's pr-title gate).
    # e.g. build(deps): bump Serilog from 4.3.0 to 4.3.1
    commit-message:
      prefix: build
    groups:
      serilog:
        patterns: ["Serilog*"]
      analyzers:
        patterns: ["StyleCop.Analyzers", "Roslynator.*"]

  # Weekly GitHub Actions update PRs.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # e.g. ci(deps): bump actions/checkout from 7.0.0 to 7.0.1
    commit-message:
      prefix: ci

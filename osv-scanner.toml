# osv-scanner accepted-vulnerability escape hatch.
#
# Read by the sbom-scan composite (release/nightly gate) and sbom-monitor.yml (weekly rescan of the
# published SBOM). List only unfixable/accepted vulnerabilities. Every entry must have an id, a reason
# (why it's acceptable), and a review date (ignoreUntil). Empty by default (= everything fails).
#
# Example:
# [[IgnoredVulns]]
# id = "GHSA-xxxx-xxxx-xxxx"
# ignoreUntil = "2026-12-31"
# reason = "Unreachable code path. To be resolved in the next major update."
